services:
  redis:
    image: redis:7-alpine
    container_name: failsafe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: failsafe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  orchestrator:
    container_name: failsafe-rag-orchestrator
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
    depends_on:
      - qdrant
      - redis
    command: uvicorn src.orchestrator_worker:app --host 0.0.0.0 --port 8000

  ui:
    container_name: failsafe-rag-ui
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
    depends_on:
      - orchestrator
      - qdrant
      - redis
    entrypoint: ["streamlit", "run", "src/app.py", "--server.address=0.0.0.0", "--server.port=8501"]

volumes:
  qdrant_storage: