version: '3.8'

services:
  # 1. State & Messaging Layer
  redis:
    image: redis:7-alpine
    container_name: failsafe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: failsafe-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # 2. Application Layer
  orchestrator:
    build: .
    container_name: failsafe-rag-orchestrator
    command: uvicorn src.orchestrator_worker:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  ui:
    build: .
    container_name: failsafe-rag-ui
    command: streamlit run src/ui.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - orchestrator

  # Optional: Ingestion Worker (uncomment if you run ingestion continuously)
  # ingestion:
  #   build: .
  #   container_name: failsafe-rag-ingestion
  #   command: python src/ingestion.py
  #   env_file:
  #     - .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_started

volumes:
  qdrant_data: