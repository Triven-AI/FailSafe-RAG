services:
  # 1. Qdrant Vector Database Server
  qdrant_server:
    image: qdrant/qdrant:latest
    container_name: aegis_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  # 2. Redis Message Broker
  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Streamlit UI
  ui:
    build: .
    container_name: aegis_ui
    command: streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant_server:6333
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  # 4. LangGraph Orchestrator Worker
  orchestrator:
    build: .
    container_name: aegis_orchestrator
    command: python -m src.orchestrator_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant_server:6333
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  # 5. Ingestion Worker
  ingestion:
    build: .
    container_name: aegis_ingestion
    command: python -m src.ingestion_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant_server:6333
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy